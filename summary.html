<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <style>
          body {
      font-family: Arial;
      background-color: #eebbe0;
    }

    .container {
      width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 50px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
        h2 {
            text-align: center;
        }
        p {
            margin: 10px 0;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2> Order summary </h2>
        <p> Name: <span id="oldName"></span></p>
        <p> Product: <span id="oldVariant"></span></p>
        <p> Quantity: <span id="oldQuantity"></span></p>
        <p> Total Amount: <span id="TOTALAMOUNT"></span></p>
        <p> Pickup Method: <span id="oldPickup"></span></p>
        <p> Address (If applicable): <span id="oldAddress"></span></p>
        <p> Thank you so much for ordering BaryoBubble! One of the first ever mosquito-repellent soap with natural ingredients. For any inquiries about your order contact us at support@baryobubble.com. </p>
        
        <button onclick="window.location.href='676767.html'">Return to Order Form</button>

    </div>

    <script>

        // Function to get cookie value
      function getCookie(name) {
    const cookies = document.cookie.split('; ');
    for (let i = 0; i < cookies.length; i++) {
        let parts = cookies[i].split('=');
        if (parts[0] === name) {
            return decodeURIComponent(parts[1]);
        }
    }
    return "";
}

        // Gets the data
        const cookieName = getCookie("name"); // Look for the cookie
        const localName = localStorage.getItem("name"); // Look for localStorage just in case
        const displayName = cookieName || localName || "None inputted"; // Prioritize cookie, then localStorage
        const newname = localStorage.getItem("name");
        const variant = localStorage.getItem("variant");
        const quantity = localStorage.getItem("quantity");
        const pickup = localStorage.getItem("pickup");
        const address = localStorage.getItem("address");

        // DDISPLAYS the data
        document.getElementById("oldName").textContent = newname || "None inputted";
        document.getElementById("oldVariant").textContent = variant || "None inputted";
        if (variant === "value1") {
            document.getElementById("oldVariant").textContent = "Dissolvable Tablet Soap (10 tablets per container) (PHP 30)";
        } else if (variant === "value2") {
            document.getElementById("oldVariant").textContent = "Bar Soap (1 bar per package) (PHP 20)";
        }
        document.getElementById("oldQuantity").textContent = quantity || "None inputted";
        document.getElementById("oldPickup").textContent = pickup || "None inputted";
        document.getElementById("oldAddress").textContent = address || "None inputted";


        //CALCULATES total amount
        TOTALAMOUNT = 0;
        if (variant === "value1") {
            TOTALAMOUNT = 30 * quantity;
        } else if (variant === "value2") {
            TOTALAMOUNT = 20 * quantity;
        }
        document.getElementById("TOTALAMOUNT").textContent = "PHP " + TOTALAMOUNT;
    </script>
</body>
</html>
